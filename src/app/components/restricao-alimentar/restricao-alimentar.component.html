<div class="w-full">
    <div class="flex items-center gap-3 mt-2 relative z-50">

        <div class="relative grow bg-[#FAFAFA] border-b-2 transition-colors rounded-t-lg"
            [ngClass]="isInvalid() ? 'border-red-500' : (dropdownAberto ? 'border-[#FFC605]' : 'border-black')">

            <input type="text" [(ngModel)]="termoBusca" [placeholder]="labelRestricao" (keyup.enter)="buscar()"
                class="w-full bg-transparent border-none px-3 py-3 text-sm outline-none focus:ring-0 placeholder:text-gray-500 truncate"
                [ngClass]="control?.value?.length > 0 && !termoBusca ? 'text-black placeholder:text-black font-medium' : 'text-black'" />

            <div *ngIf="dropdownAberto"
                class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 shadow-xl rounded-md overflow-hidden z-50">
                <ul class="max-h-48 overflow-y-auto">

                    <li *ngIf="opcoesFiltradas.length === 0" class="px-4 py-3 text-sm text-gray-500 text-center">
                        Nenhuma restrição encontrada.
                    </li>

                    <li *ngFor="let op of opcoesFiltradas" (click)="selecionarOpcao(op.value, $event)"
                        class="px-4 py-3 flex items-center gap-3 text-sm text-black hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50 last:border-0">

                        <div class="w-4 h-4 rounded border flex items-center justify-center transition-colors shrink-0"
                            [ngClass]="control?.value?.includes(op.value) ? 'bg-[#FFC605] border-[#FFC605]' : 'border-gray-300 bg-white'">
                            <svg *ngIf="control?.value?.includes(op.value)" class="w-3 h-3 text-black" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>

                        {{ op.label }}
                    </li>
                </ul>
            </div>
        </div>

        <button type="button" (click)="buscar($event)"
            class="bg-gray-50 hover:bg-[#FFC605] text-black w-11 h-11 rounded-lg transition-colors cursor-pointer shrink-0 shadow-sm flex items-center justify-center outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
            </svg>
        </button>

    </div>
    
    <div *ngIf="isInvalid()" class="text-red-500 text-xs mt-1 ml-1">Selecione pelo menos uma restrição.</div>
</div>
