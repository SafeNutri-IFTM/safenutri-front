<div class="min-h-screen flex flex-col font-sans bg-white">
    <app-navbar-login></app-navbar-login>

    <main class="grow flex items-center justify-center py-12 px-6">
        <div
            class="bg-white rounded-2xl shadow-[0_4px_30px_rgba(0,0,0,0.08)] border border-gray-100 w-full max-w-6xl p-10 md:p-16">

            <h1 class="text-4xl md:text-5xl font-bold text-[#4A4A68] text-center mb-16">
                Cadastro de Restrição alimentar
            </h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-start">

                <div class="flex flex-col gap-8">
                    <p class="text-gray-600 text-xl leading-relaxed text-left">
                        Caso você não tenha encontrado sua restrição alimentar, poderá solicitar seu cadastro no
                        sistema.
                        O administrador analisará sua solicitação e, caso seja aprovada, você receberá uma notificação
                        por e-mail.
                    </p>

                    <div class="flex justify-start">
                        <img src="assets/cadastro-restricao.png" alt="Ilustração Cadastro"
                            class="w-full max-w-sm object-contain">
                    </div>
                </div>

                <div class="flex flex-col">
                    <form [formGroup]="restricaoForm" (ngSubmit)="save()" class="space-y-10">

                        <div class="flex flex-col gap-3">
                            <label class="text-gray-700 font-bold text-lg text-left">Nome da restrição alimentar</label>
                            <div class="relative bg-gray-50 border-b-2 border-primary rounded-t-lg">
                                <input type="text" formControlName="restricao" placeholder="Restrição alimentar"
                                    class="w-full bg-transparent border-none py-4 px-4 focus:ring-0 text-yellow text-lg outline-none">
                            </div>
                            <div *ngIf="isInvalid('restricao')" class="text-red-500 text-sm mt-1 text-left">
                                O nome é obrigatório (mínimo 3 caracteres).
                            </div>
                        </div>

                        <div class="flex flex-col gap-3">
                            <label class="text-gray-700 font-bold text-lg text-left">Descrição da Restrição</label>
                            <div
                                class="bg-gray-50 border border-gray-200 rounded-xl p-3 focus-within:border-primary transition-colors">
                                <textarea formControlName="descricao" placeholder="Descrição..."
                                    class="w-full bg-transparent border-none focus:ring-0 text-yellow text-lg outline-none min-h-[180px] resize-none"></textarea>
                            </div>
                        </div>

                        <div class="flex gap-6 pt-6 justify-center md:justify-end">
                            <a routerLink="/home"
                                class="w-40 text-center py-3 rounded-full border-2 border-black text-black font-bold text-lg hover:bg-gray-100 transition-all">
                                Voltar
                            </a>
                            <button type="submit" [disabled]="restricaoForm.invalid"
                                class="w-40 py-3 rounded-full bg-primary text-black font-bold text-lg hover:bg-[#e6b305] transition-all shadow-md disabled:opacity-30">
                                Solicitar
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <app-footer></app-footer>
</div>
