<div class="min-h-screen flex flex-col font-['Inter'] bg-white relative">
  <app-navbar-login></app-navbar-login>

  <div *ngIf="dropdownCrn || dropdownGenero" class="fixed inset-0 z-30" (click)="fecharDropdowns()"></div>

  <main class="flex-grow flex items-center justify-center py-10 px-4">
    <div
      class="bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.08)] border border-gray-100 w-full max-w-md overflow-visible">

      <div class="flex h-14">
        <div (click)="irParaCliente()"
          class="flex-1 bg-white flex items-center justify-center gap-2 font-normal text-gray-600 hover:bg-gray-50 transition-colors border-b border-gray-200 rounded-tl-xl cursor-pointer text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          Cliente
        </div>
        <div
          class="flex-1 bg-[#FFC605] flex items-center justify-center gap-2 font-semibold text-black rounded-tr-xl cursor-default text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
            </path>
          </svg>
          Nutricionista
        </div>
      </div>

      <div class="p-8">
        <h2 class="text-2xl font-medium mb-6 text-black">Cadastre-se</h2>

        <form [formGroup]="nutriForm" (ngSubmit)="onSubmit()" class="space-y-4">

          <div
            class="relative bg-[#F8F9FA] border-b-2 border-black focus-within:border-[#FFC605] transition-colors rounded-t-lg">
            <input type="text" formControlName="nome" id="nome_nutri" placeholder=" "
              class="peer w-full bg-transparent border-none pt-6 pb-2 px-3 focus:ring-0 text-black text-sm font-normal outline-none">
            <label for="nome_nutri"
              class="absolute text-sm text-gray-500 font-medium duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-3 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-[#FFC605] cursor-text">Nome
              Completo</label>
          </div>

          <div
            class="relative bg-[#F8F9FA] border-b-2 border-black focus-within:border-[#FFC605] transition-colors rounded-t-lg">
            <input type="email" formControlName="email" id="email_nutri" placeholder=" "
              class="peer w-full bg-transparent border-none pt-6 pb-2 px-3 focus:ring-0 text-black text-sm font-normal outline-none">
            <label for="email_nutri"
              class="absolute text-sm text-gray-500 font-medium duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-3 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-[#FFC605] cursor-text">Email</label>
          </div>

          <div
            class="relative bg-[#F8F9FA] border-b-2 border-black focus-within:border-[#FFC605] transition-colors rounded-t-lg flex items-center justify-between">
            <div class="flex-grow relative">
              <input [type]="hidePassword ? 'password' : 'text'" formControlName="senha" id="senha_nutri"
                placeholder=" "
                class="peer w-full bg-transparent border-none pt-6 pb-2 px-3 focus:ring-0 text-black text-sm font-normal outline-none">
              <label for="senha_nutri"
                class="absolute text-sm text-gray-500 font-medium duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-3 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-[#FFC605] cursor-text">Senha</label>
            </div>
            <button type="button" (click)="togglePasswordVisibility()"
              class="cursor-pointer text-gray-500 hover:text-black focus:outline-none pr-3 pt-4 transition-colors">
              <svg *ngIf="hidePassword" class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor"
                viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88">
                </path>
              </svg>
              <svg *ngIf="!hidePassword" class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor"
                viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z">
                </path>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </button>
          </div>

          <div
            class="relative bg-[#F8F9FA] border-b-2 border-black focus-within:border-[#FFC605] transition-colors rounded-t-lg flex items-center justify-between mt-2">
            <div class="flex-grow relative">
              <input #datePicker_nutri type="date" formControlName="dataNascimento" id="data_nutri" placeholder=" "
                class="peer w-full bg-transparent border-none pt-6 pb-2 px-3 focus:ring-0 text-black text-sm font-normal outline-none uppercase appearance-none cursor-text">
              <label for="data_nutri"
                class="absolute text-sm text-gray-500 font-medium duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-3 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-[#FFC605] cursor-text">Data
                de Nascimento</label>
            </div>
            <button type="button" (click)="datePicker_nutri.showPicker()"
              class="cursor-pointer text-gray-500 hover:text-black focus:outline-none pr-3 pt-4 transition-colors">
              <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
            </button>
          </div>

          <div class="relative bg-[#FAFAFA] border-b-2 transition-colors rounded-t-lg mt-2 z-50"
            [ngClass]="dropdownCrn ? 'border-[#FFC605]' : 'border-black'">
            <div (click)="toggleDropdown('crn', $event)"
              class="flex items-center justify-between px-3 py-3 cursor-pointer">
              <div class="flex items-center gap-2 w-full">
                <span class="text-sm font-normal"
                  [ngClass]="nutriForm.get('crnEstado')?.value ? 'text-black' : 'text-gray-500'">
                  {{ labelCrn }}
                </span>
              </div>
              <svg class="w-4 h-4 text-gray-500 transition-transform duration-200" [class.rotate-180]="dropdownCrn"
                fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>

            <div *ngIf="dropdownCrn"
              class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 shadow-xl rounded-md overflow-hidden z-50">
              <ul class="max-h-48 overflow-y-auto">
                <li *ngFor="let op of opcoesCrn" (click)="selecionarOpcao('crnEstado', op.value, $event)"
                  class="px-4 py-3 text-sm text-black hover:bg-[#FFC605] cursor-pointer transition-colors border-b border-gray-50 last:border-0">
                  {{ op.label }}
                </li>
              </ul>
            </div>
          </div>

          <div
            class="relative bg-[#F8F9FA] border-b-2 border-black focus-within:border-[#FFC605] transition-colors rounded-t-lg mt-2">
            <input type="text" formControlName="crnNumero" id="crnNumero" placeholder=" "
              class="peer w-full bg-transparent border-none pt-6 pb-2 px-3 focus:ring-0 text-black text-sm font-normal outline-none placeholder-gray-500">
            <label for="crnNumero"
              class="absolute text-sm text-gray-500 font-medium duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-3 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-[#FFC605] cursor-text">CRN
              (Número. Ex: 12345/MG)</label>
          </div>

          <div class="relative bg-[#FAFAFA] border-b-2 transition-colors rounded-t-lg mt-2 z-40"
            [ngClass]="dropdownGenero ? 'border-[#FFC605]' : 'border-black'">
            <div (click)="toggleDropdown('genero', $event)"
              class="flex items-center justify-between px-3 py-3 cursor-pointer">
              <div class="flex items-center gap-2 w-full">
                <span class="text-sm font-normal"
                  [ngClass]="nutriForm.get('genero')?.value ? 'text-black' : 'text-gray-500'">
                  {{ labelGenero }}
                </span>
              </div>
              <svg class="w-4 h-4 text-gray-500 transition-transform duration-200" [class.rotate-180]="dropdownGenero"
                fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>

            <div *ngIf="dropdownGenero"
              class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 shadow-xl rounded-md overflow-hidden z-50">
              <ul class="max-h-48 overflow-y-auto">
                <li *ngFor="let op of opcoesGenero" (click)="selecionarOpcao('genero', op.value, $event)"
                  class="px-4 py-3 text-sm text-black hover:bg-[#FFC605] cursor-pointer transition-colors border-b border-gray-50 last:border-0">
                  {{ op.label }}
                </li>
              </ul>
            </div>
          </div>

          <div class="pt-6 flex flex-col items-center relative z-0">
            <button type="submit" [disabled]="nutriForm.invalid"
              class="cursor-pointer w-[80%] bg-[#FFC605] text-black font-semibold py-3 rounded-[2rem] shadow-[0_4px_10px_rgba(255,198,5,0.3)] hover:bg-[#e6b305] transition-colors disabled:opacity-50 text-[15px]">Criar
              conta</button>
            <p class="mt-6 text-[15px] font-normal text-black">Já possui uma conta? <a routerLink="/login"
                class="text-[#FFC605] hover:underline cursor-pointer font-medium">Faça login</a></p>
          </div>

        </form>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
