<div class="min-h-screen flex flex-col font-['Arial'] bg-gray-100 relative">
    <app-navbar-login></app-navbar-login>

    <main class="grow flex items-center justify-center py-10 px-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-md p-8">

            <!-- Título -->
            <h1 class="text-3xl font-semibold text-center text-gray-700 mb-6">
                Login
            </h1>

            <!-- Formulário -->
            <form [formGroup]="loginForm" (ngSubmit)="efetuarLogin()" class="space-y-4">

                <!-- Email -->
                <div>
                    <input type="email" formControlName="email" placeholder="Email"
                        class="w-full border-b border-gray-300 bg-transparent py-2 outline-none focus:border-yellow-500">
                </div>

                <!-- Senha -->
                <div class="relative">
                    <input [type]="showPasswordToggle ? 'text' : 'password'" formControlName="password"
                        placeholder="Senha"
                        class="w-full border-b border-gray-300 bg-transparent py-2 outline-none focus:border-yellow-500 pr-10">

                    <!-- Ícone toggle senha -->
                    <button type="button" (click)="togglePassword()"
                        class="absolute right-2 top-2 text-gray-500 hover:text-black focus:outline-none transition-colors">

                        <svg *ngIf="!showPasswordToggle" class="w-5 h-5 pointer-events-none" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88">
                            </path>
                        </svg>

                        <svg *ngIf="showPasswordToggle" class="w-5 h-5 pointer-events-none" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                            </path>
                        </svg>
                    </button>
                </div>

                <!-- Esqueceu senha -->
                <div>
                    <a routerLink="/forgot-password" class="text-sm text-yellow-500 hover:underline">
                        Esqueceu a senha?
                    </a>
                </div>

                <!-- Botão (usando seu componente) -->
                <div class="flex justify-center">
                    <div [ngClass]="{'opacity-50 pointer-events-none': loginForm.invalid || loading}"
                        class="w-[70%] mx-auto">
                        <app-button-primary value="Entrar"></app-button-primary>
                    </div>
                </div>

                <!-- OU -->
                <div class="flex items-center gap-3 my-4">
                    <div class="flex-1 h-px bg-gray-300"></div>
                    <span class="text-gray-500 text-sm">OU</span>
                    <div class="flex-1 h-px bg-gray-300"></div>
                </div>

                <!-- Cadastro -->
                <p class="text-center text-sm text-gray-600">
                    Ainda não tem uma conta?
                    <a routerLink="/cadastro" class="text-yellow-500 font-medium hover:underline">
                        Cadastre-se
                    </a>
                </p>

            </form>
        </div>
    </main>

    <!-- Spinner -->
    <app-spinner *ngIf="loading"></app-spinner>

    <app-footer></app-footer>
</div>
