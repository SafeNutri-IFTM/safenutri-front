<div class="modal-overlay" *ngIf="isOpen">
    <div class="modal-content">

        <div class="modal-header">
            <h2>{{ titulo }}</h2>
            <button class="close-icon" (click)="onClose()">&times;</button>
        </div>

        <div class="modal-body">
            <div class="texto-documento" [innerHTML]="formatarTexto(texto)"></div>
        </div>

        <div class="modal-footer">
            <app-button-primary (click)="onClose()" value="Entendi"></app-button-primary>
        </div>

    </div>
</div>
